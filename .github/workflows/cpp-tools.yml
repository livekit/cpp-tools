name: C++ Tools

on:
  workflow_call:
    inputs:
      clang_format:
        description: Run the clang-format job.
        type: boolean
        default: true
      clang_tidy:
        description: Run the clang-tidy job.
        type: boolean
        default: true
      checkout_submodules:
        description: Submodule checkout mode passed to actions/checkout.
        type: string
        default: recursive
      clang_format_version:
        description: LLVM clang-format major version to install.
        type: string
        default: "22"
      clang_format_runner:
        description: Optional executable consumer wrapper; when set, clang_format_paths is not required.
        type: string
        default: ""
      clang_format_paths:
        description: Space-separated paths checked by clang-format; required when enabled without a runner.
        type: string
        default: ""
      clang_tidy_version:
        description: LLVM clang-tidy major version to install.
        type: string
        default: "19"
      clang_tidy_runner:
        description: Optional executable consumer wrapper; when set, clang_tidy_file_regex is not required.
        type: string
        default: ""
      clang_tidy_fail_on_warning:
        description: Fail the clang-tidy job when warnings are emitted.
        type: boolean
        default: true
      clang_tidy_dependencies_command:
        description: Shell command that installs project dependencies for clang-tidy.
        type: string
        default: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            llvm-dev libclang-dev clang \
            libssl-dev wget ca-certificates gnupg
      clang_tidy_install_rust:
        description: Install the stable Rust toolchain before configuring the project.
        type: boolean
        default: false
      clang_tidy_setup_command:
        description: Optional shell command that prepares the clang-tidy environment.
        type: string
        default: ""
      clang_tidy_configure_command:
        description: Shell command that configures the compilation database build.
        type: string
        default: ""
      clang_tidy_generate_command:
        description: Optional shell command that generates required source files.
        type: string
        default: ""
      clang_tidy_build_dir:
        description: Directory containing compile_commands.json.
        type: string
        default: build-release
      clang_tidy_file_regex:
        description: Source-file regex for run-clang-tidy; required when enabled without a runner.
        type: string
        default: ""
      clang_tidy_header_filter:
        description: Optional clang-tidy header filter regular expression.
        type: string
        default: ""
      clang_tidy_exclude_header_filter:
        description: Optional clang-tidy excluded-header filter regular expression.
        type: string
        default: ""
permissions:
  contents: read

jobs:
  clang-format:
    name: clang-format
    if: ${{ inputs.clang_format }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validate clang-format inputs
        env:
          CLANG_FORMAT_RUNNER: ${{ inputs.clang_format_runner }}
          CLANG_FORMAT_PATHS_INPUT: ${{ inputs.clang_format_paths }}
        run: |
          if [[ -z "${CLANG_FORMAT_RUNNER}" && -z "${CLANG_FORMAT_PATHS_INPUT}" ]]; then
            echo "::error::clang_format_runner or clang_format_paths is required when clang_format is enabled."
            exit 2
          fi

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: ${{ inputs.checkout_submodules }}
          fetch-depth: 1

      - name: Install shared configuration
        run: ./cpp-tools/install.sh clang-format --repo-root "$GITHUB_WORKSPACE" --force

      - name: Install clang-format ${{ inputs.clang_format_version }}
        env:
          LLVM_VERSION: ${{ inputs.clang_format_version }}
        run: |
          set -eux
          sudo install -m 0755 -d /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/keyrings/llvm.asc >/dev/null
          sudo chmod a+r /etc/apt/keyrings/llvm.asc
          codename=$(lsb_release -cs)
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-${LLVM_VERSION} main" \
            | sudo tee "/etc/apt/sources.list.d/llvm-${LLVM_VERSION}.list" >/dev/null
          sudo apt-get update
          sudo apt-get install -y "clang-format-${LLVM_VERSION}"
          sudo ln -sf "/usr/bin/clang-format-${LLVM_VERSION}" /usr/local/bin/clang-format
          clang-format --version

      - name: Run clang-format
        env:
          FORMAT_BLOB_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          CLANG_FORMAT_RUNNER: ${{ inputs.clang_format_runner }}
          CLANG_FORMAT_PATHS_INPUT: ${{ inputs.clang_format_paths }}
        run: |
          set -euo pipefail
          if [[ -n "${CLANG_FORMAT_RUNNER}" ]]; then
            runner="${CLANG_FORMAT_RUNNER}"
            if [[ "${runner}" != /* ]]; then
              runner="${GITHUB_WORKSPACE}/${runner}"
            fi
            if [[ ! -x "${runner}" ]]; then
              echo "::error::clang_format_runner is not executable: ${CLANG_FORMAT_RUNNER}"
              exit 2
            fi
            "${runner}"
          else
            args=()
            for path in ${CLANG_FORMAT_PATHS_INPUT}; do
              args+=(--path "${path}")
            done
            ./cpp-tools/clang-format.sh \
              --repo-root "$GITHUB_WORKSPACE" \
              "${args[@]}"
          fi

  clang-tidy:
    name: clang-tidy
    if: ${{ inputs.clang_tidy }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Validate clang-tidy inputs
        env:
          CLANG_TIDY_RUNNER: ${{ inputs.clang_tidy_runner }}
          CLANG_TIDY_FILE_REGEX: ${{ inputs.clang_tidy_file_regex }}
        run: |
          if [[ -z "${CLANG_TIDY_RUNNER}" && -z "${CLANG_TIDY_FILE_REGEX}" ]]; then
            echo "::error::clang_tidy_runner or clang_tidy_file_regex is required when clang_tidy is enabled."
            exit 2
          fi

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: ${{ inputs.checkout_submodules }}
          fetch-depth: 1

      - name: Install shared configuration
        run: ./cpp-tools/install.sh clang-tidy --repo-root "$GITHUB_WORKSPACE" --force

      - name: Install dependencies
        if: ${{ inputs.clang_tidy_dependencies_command != '' }}
        env:
          CLANG_TIDY_DEPENDENCIES_COMMAND: ${{ inputs.clang_tidy_dependencies_command }}
        run: |
          set -euo pipefail
          eval "${CLANG_TIDY_DEPENDENCIES_COMMAND}"

      - name: Install clang-tidy ${{ inputs.clang_tidy_version }}
        env:
          LLVM_VERSION: ${{ inputs.clang_tidy_version }}
        run: |
          set -eux
          sudo install -m 0755 -d /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/keyrings/llvm.asc >/dev/null
          sudo chmod a+r /etc/apt/keyrings/llvm.asc
          codename=$(lsb_release -cs)
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-${LLVM_VERSION} main" \
            | sudo tee "/etc/apt/sources.list.d/llvm-${LLVM_VERSION}.list" >/dev/null
          sudo apt-get update
          sudo apt-get install -y "clang-tidy-${LLVM_VERSION}" "clang-tools-${LLVM_VERSION}"
          sudo ln -sf "/usr/bin/clang-tidy-${LLVM_VERSION}" /usr/local/bin/clang-tidy
          sudo ln -sf "/usr/bin/run-clang-tidy-${LLVM_VERSION}" /usr/local/bin/run-clang-tidy
          clang-tidy --version
          run-clang-tidy --help | head -1 || true

      - name: Install Rust
        if: ${{ inputs.clang_tidy_install_rust }}
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Setup clang-tidy environment
        if: ${{ inputs.clang_tidy_setup_command != '' }}
        env:
          CLANG_TIDY_SETUP_COMMAND: ${{ inputs.clang_tidy_setup_command }}
        run: |
          set -euo pipefail
          eval "${CLANG_TIDY_SETUP_COMMAND}"

      - name: Configure project
        if: ${{ inputs.clang_tidy_configure_command != '' }}
        env:
          CLANG_TIDY_CONFIGURE_COMMAND: ${{ inputs.clang_tidy_configure_command }}
        run: |
          set -euo pipefail
          eval "${CLANG_TIDY_CONFIGURE_COMMAND}"

      - name: Generate clang-tidy prerequisites
        if: ${{ inputs.clang_tidy_generate_command != '' }}
        env:
          CLANG_TIDY_GENERATE_COMMAND: ${{ inputs.clang_tidy_generate_command }}
        run: |
          set -euo pipefail
          eval "${CLANG_TIDY_GENERATE_COMMAND}"

      - name: Run clang-tidy
        env:
          TIDY_BLOB_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          CLANG_TIDY_RUNNER: ${{ inputs.clang_tidy_runner }}
          CLANG_TIDY_BUILD_DIR: ${{ inputs.clang_tidy_build_dir }}
          CLANG_TIDY_FILE_REGEX: ${{ inputs.clang_tidy_file_regex }}
          CLANG_TIDY_HEADER_FILTER: ${{ inputs.clang_tidy_header_filter }}
          CLANG_TIDY_EXCLUDE_HEADER_FILTER: ${{ inputs.clang_tidy_exclude_header_filter }}
          CLANG_TIDY_FAIL_ON_WARNING: ${{ inputs.clang_tidy_fail_on_warning }}
        run: |
          set -euo pipefail
          args=()
          if [[ "${CLANG_TIDY_FAIL_ON_WARNING}" == "true" ]]; then
            args+=(--fail-on-warning)
          fi
          if [[ -n "${CLANG_TIDY_RUNNER}" ]]; then
            runner="${CLANG_TIDY_RUNNER}"
            if [[ "${runner}" != /* ]]; then
              runner="${GITHUB_WORKSPACE}/${runner}"
            fi
            if [[ ! -x "${runner}" ]]; then
              echo "::error::clang_tidy_runner is not executable: ${CLANG_TIDY_RUNNER}"
              exit 2
            fi
            "${runner}" "${args[@]}"
          else
            args=(
              --repo-root "$GITHUB_WORKSPACE"
              --build-dir "${CLANG_TIDY_BUILD_DIR}"
              --file-regex "${CLANG_TIDY_FILE_REGEX}"
              "${args[@]}"
            )
            if [[ -n "${CLANG_TIDY_HEADER_FILTER}" ]]; then
              args+=(--header-filter "${CLANG_TIDY_HEADER_FILTER}")
            fi
            if [[ -n "${CLANG_TIDY_EXCLUDE_HEADER_FILTER}" ]]; then
              args+=(--exclude-header-filter "${CLANG_TIDY_EXCLUDE_HEADER_FILTER}")
            fi
            ./cpp-tools/clang-tidy.sh "${args[@]}"
          fi
